name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip the run triggered by the bot's own VERSION bump commit at the
    # end of this workflow, otherwise the build would loop.
    if: ${{ github.actor != 'github-actions[bot]' }}
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      service: webprotege-nginx

    steps:
      - uses: actions/checkout@v4

      - name: Read release version
        id: release-version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "Release version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Tag release commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.release-version.outputs.version }}
          git push origin ${{ steps.release-version.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/webprotege-nginx
          docker build -t "$IMAGE:${{ steps.release-version.outputs.version }}" .
          docker push "$IMAGE:${{ steps.release-version.outputs.version }}"

      - name: Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release-version.outputs.version }}
          generate_release_notes: true

      # After the release, bump the patch version in VERSION so the next
      # merge to main produces a new release.  For example, after releasing
      # 2.0.3 the file is set to 2.0.4.
      - name: Bump VERSION for next release
        run: |
          released=${{ steps.release-version.outputs.version }}
          IFS='.' read -r -a parts <<< "$released"
          parts[2]=$((parts[2] + 1))
          next="${parts[0]}.${parts[1]}.${parts[2]}"
          echo "Next version: $next"
          echo "$next" > VERSION
          git add VERSION
          git commit -m "Bump VERSION to $next"
          git push origin HEAD:${GITHUB_REF##*/}
